<!DOCTYPE html>

<head>

<body>

  <header class="page-hero">
    <div class="page-hero-content">
      <span class="page-eyebrow">Fotoalbum · 8 foto's</span>
      <h1>Benefietconcert <em>2025</em></h1>
      <div class="page-meta">
        <span>📅 13 september 2025</span>
        <span>📍 Dorpskerk Goor</span>
        <span>🕑 19:30 – 21:30 uur</span>
        <span>📷 Foto's: Kees Hulsbosch</span>
      </div>
    </div>
  </header>

  <main class="photo-section">
    <div class="photo-grid">

      <!-- 1: Church exterior dusk wide -->
      <div class="photo-cell wide">
        <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#060810"/>
              <stop offset="100%" stop-color="#100c18"/>
            </linearGradient>
            <radialGradient id="bglow" cx="50%" cy="55%" r="35%">
              <stop offset="0%" stop-color="rgba(255,180,60,0.3)"/>
              <stop offset="100%" stop-color="rgba(255,180,60,0)"/>
            </radialGradient>
          </defs>
          <rect width="800" height="300" fill="url(#bg1)"/>
          <!-- Stars -->
          <circle cx="60" cy="22" r="1.5" fill="rgba(255,255,255,0.7)"/>
          <circle cx="150" cy="14" r="1" fill="rgba(255,255,255,0.5)"/>
          <circle cx="320" cy="18" r="1.5" fill="rgba(255,255,255,0.8)"/>
          <circle cx="500" cy="12" r="1" fill="rgba(255,255,255,0.6)"/>
          <circle cx="680" cy="20" r="1.5" fill="rgba(255,255,255,0.7)"/>
          <!-- Church building -->
          <rect x="230" y="100" width="340" height="200" fill="#0a0810" rx="2"/>
          <!-- Church tower -->
          <rect x="358" y="30" width="84" height="180" fill="#0c0a12" rx="2"/>
          <polygon points="358,30 400,0 442,30" fill="#0a0810"/><!-- spire -->
          <!-- Cross on spire -->
          <line x1="400" y1="5" x2="400" y2="30" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
          <line x1="390" y1="15" x2="410" y2="15" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
          <!-- Gothic windows -->
          <rect x="260" y="120" width="45" height="70" fill="#1a1428" rx="22 22 0 0"/>
          <rect x="260" y="120" width="45" height="70" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="1.5" rx="22 22 0 0"/>
          <rect x="495" y="120" width="45" height="70" fill="#1a1428" rx="22 22 0 0"/>
          <rect x="495" y="120" width="45" height="70" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="1.5" rx="22 22 0 0"/>
          <!-- Warm glow from windows -->
          <rect x="260" y="120" width="45" height="70" fill="rgba(255,180,60,0.18)" rx="22 22 0 0"/>
          <rect x="495" y="120" width="45" height="70" fill="rgba(255,180,60,0.18)" rx="22 22 0 0"/>
          <!-- Tower windows -->
          <rect x="373" y="55" width="24" height="40" fill="#1a1428" rx="12 12 0 0"/>
          <rect x="373" y="55" width="24" height="40" fill="rgba(255,180,60,0.2)" rx="12 12 0 0"/>
          <rect width="800" height="300" fill="url(#bglow)"/>
          <!-- Church door entrance glow -->
          <rect x="365" y="210" width="70" height="90" fill="rgba(255,180,60,0.25)" rx="35 35 0 0"/>
          <!-- Visitors entering silhouettes -->
          <circle cx="345" cy="265" r="12" fill="#100a14"/>
          <rect x="335" y="276" width="20" height="24" fill="#100a14" rx="1"/>
          <circle cx="385" cy="260" r="12" fill="#140c18"/>
          <rect x="375" y="271" width="20" height="24" fill="#140c18" rx="1"/>
          <circle cx="425" cy="265" r="12" fill="#100a14"/>
          <rect x="415" y="276" width="20" height="24" fill="#100a14" rx="1"/>
          <!-- Trees -->
          <rect x="130" y="180" width="20" height="120" fill="#080810" rx="1"/>
          <polygon points="140,70 108,185 172,185" fill="#0c0a14"/>
          <rect x="650" y="175" width="20" height="125" fill="#080810" rx="1"/>
          <polygon points="660,65 628,180 692,180" fill="#0c0a14"/>
          <text x="400" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(201,168,76,0.45)" letter-spacing="1">DORPSKERK GOOR · SEPTEMBER 2025</text>
        </svg>
      </div>

      <!-- 2: Candlelight detail -->
      <div class="photo-cell">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="bg2" cx="50%" cy="55%" r="45%">
              <stop offset="0%" stop-color="rgba(255,160,40,0.5)"/>
              <stop offset="50%" stop-color="rgba(200,100,20,0.2)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </radialGradient>
          </defs>
          <rect width="400" height="300" fill="#060404"/>
          <rect width="400" height="300" fill="url(#bg2)"/>
          <!-- Three candles close up -->
          <!-- Candle 1 -->
          <rect x="135" y="160" width="18" height="80" fill="#d4c8a0"/>
          <ellipse cx="144" cy="158" rx="9" ry="6" fill="#c8bc96"/>
          <ellipse cx="144" cy="148" rx="4" ry="7" fill="rgba(255,200,60,0.95)"/>
          <ellipse cx="144" cy="145" rx="2.5" ry="4" fill="rgba(255,240,140,1)"/>
          <!-- Candle 2 -->
          <rect x="190" y="145" width="20" height="100" fill="#d4c8a0"/>
          <ellipse cx="200" cy="143" rx="10" ry="6.5" fill="#c8bc96"/>
          <ellipse cx="200" cy="132" rx="4.5" ry="8" fill="rgba(255,200,60,0.95)"/>
          <ellipse cx="200" cy="128" rx="3" ry="5" fill="rgba(255,240,140,1)"/>
          <!-- Candle 3 -->
          <rect x="252" y="155" width="18" height="90" fill="#d4c8a0"/>
          <ellipse cx="261" cy="153" rx="9" ry="6" fill="#c8bc96"/>
          <ellipse cx="261" cy="143" rx="4" ry="7" fill="rgba(255,200,60,0.95)"/>
          <ellipse cx="261" cy="140" rx="2.5" ry="4" fill="rgba(255,240,140,1)"/>
          <!-- Candelabra base -->
          <rect x="130" y="238" width="30" height="8" fill="#8a6a22" rx="2"/>
          <rect x="185" y="243" width="30" height="8" fill="#8a6a22" rx="2"/>
          <rect x="247" y="240" width="30" height="8" fill="#8a6a22" rx="2"/>
          <!-- Warm glow on floor/surface -->
          <ellipse cx="200" cy="270" rx="120" ry="18" fill="rgba(255,160,40,0.12)"/>
          <!-- Background church interior blur -->
          <circle cx="60" cy="180" r="25" fill="rgba(255,160,40,0.05)"/>
          <circle cx="340" cy="175" r="25" fill="rgba(255,160,40,0.05)"/>
          <text x="200" y="296" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="rgba(255,160,40,0.6)" letter-spacing="1">KAARSLICHT IN DE KERK</text>
        </svg>
      </div>

      <!-- 3: Donatie moment -->
      <div class="photo-cell">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="bg3" cx="50%" cy="40%" r="50%">
              <stop offset="0%" stop-color="rgba(201,168,76,0.18)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </radialGradient>
          </defs>
          <rect width="400" height="300" fill="#080608"/>
          <rect width="400" height="300" fill="url(#bg3)"/>
          <!-- Two people, one with collection box -->
          <circle cx="145" cy="115" r="35" fill="#1a1210"/>
          <rect x="120" y="148" width="50" height="80" fill="#100c08" rx="3"/>
          <circle cx="255" cy="120" r="35" fill="#180e0c"/>
          <rect x="230" y="153" width="50" height="80" fill="#100c08" rx="3"/>
          <!-- Collection basket between them -->
          <rect x="175" y="185" width="50" height="32" fill="#1a1408" rx="4" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>
          <rect x="175" y="183" width="50" height="8" fill="#1a1408" rx="2"/>
          <!-- Donation hand gesture -->
          <line x1="145" y1="155" x2="182" y2="188" stroke="#1a1210" stroke-width="10" stroke-linecap="round"/>
          <line x1="255" y1="160" x2="218" y2="190" stroke="#180e0c" stroke-width="10" stroke-linecap="round"/>
          <!-- Money symbol on box -->
          <text x="200" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="rgba(201,168,76,0.5)">€</text>
          <!-- Church background -->
          <rect x="0" y="240" width="400" height="60" fill="#0a0808"/>
          <line x1="0" y1="240" x2="400" y2="240" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
          <text x="200" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(201,168,76,0.45)" letter-spacing="1">OPBRENGST VOOR DE VOEDSELBANK</text>
        </svg>
      </div>

      <!-- 4: Musicians in church interior (wide) -->
      <div class="photo-cell wide">
        <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#080606"/>
              <stop offset="100%" stop-color="#140e08"/>
            </linearGradient>
            <radialGradient id="bglow4" cx="50%" cy="55%" r="40%">
              <stop offset="0%" stop-color="rgba(255,160,40,0.35)"/>
              <stop offset="70%" stop-color="rgba(200,100,20,0.10)"/>
              <stop offset="100%" stop-color="rgba(200,100,20,0)"/>
            </radialGradient>
          </defs>
          <rect width="800" height="300" fill="url(#bg4)"/>
          <rect width="800" height="300" fill="url(#bglow4)"/>
          <!-- Gothic arches background -->
          <rect x="180" y="0" width="440" height="220" fill="#0a0810" rx="220 220 0 0" opacity="0.6"/>
          <rect x="180" y="0" width="440" height="220" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="2" rx="220 220 0 0"/>
          <!-- Side arches smaller -->
          <rect x="60" y="30" width="130" height="170" fill="#0a0810" rx="65 65 0 0" opacity="0.5"/>
          <rect x="610" y="30" width="130" height="170" fill="#0a0810" rx="65 65 0 0" opacity="0.5"/>
          <!-- Pillars -->
          <rect x="58" y="0" width="18" height="300" fill="#0e0c10"/>
          <rect x="180" y="0" width="16" height="300" fill="#100e12"/>
          <rect x="606" y="0" width="16" height="300" fill="#100e12"/>
          <rect x="724" y="0" width="18" height="300" fill="#0e0c10"/>
          <!-- Candle glow in arch window -->
          <ellipse cx="400" cy="90" rx="60" ry="40" fill="rgba(255,160,40,0.12)"/>
          <!-- Floor -->
          <rect y="250" width="800" height="50" fill="#100c0a"/>
          <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(201,168,76,0.2)" stroke-width="1.5"/>
          <!-- Musicians across altar area -->
          <circle cx="220" cy="215" r="12" fill="#140c08"/><rect x="210" y="226" width="20" height="30" fill="#100a06" rx="1"/>
          <circle cx="265" cy="210" r="12" fill="#180e0a"/><rect x="255" y="221" width="20" height="32" fill="#140c08" rx="1"/>
          <circle cx="312" cy="213" r="12" fill="#140c08"/>
          <circle cx="362" cy="207" r="13" fill="#180e0a"/><!-- Dirigent -->
          <line x1="375" y1="215" x2="390" y2="205" stroke="#180e0a" stroke-width="2.5"/>
          <circle cx="400" cy="207" r="13" fill="#140c08"/>
          <circle cx="450" cy="213" r="12" fill="#180e0a"/>
          <circle cx="495" cy="210" r="12" fill="#140c08"/>
          <circle cx="540" cy="215" r="12" fill="#180e0a"/>
          <!-- Candles flanking altar area -->
          <ellipse cx="190" cy="210" rx="4" ry="6" fill="rgba(255,200,60,0.85)"/>
          <ellipse cx="190" cy="207" rx="2.5" ry="4" fill="rgba(255,240,140,0.95)"/>
          <ellipse cx="610" cy="210" rx="4" ry="6" fill="rgba(255,200,60,0.85)"/>
          <ellipse cx="610" cy="207" rx="2.5" ry="4" fill="rgba(255,240,140,0.95)"/>
          <!-- Audience pews -->
          <rect x="100" y="255" width="600" height="12" fill="#0d0a08" rx="2"/>
          <g opacity="0.55">
            <circle cx="140" cy="252" r="9" fill="#1a1208"/><circle cx="175" cy="247" r="9" fill="#1e1608"/>
            <circle cx="210" cy="252" r="9" fill="#1a1208"/><circle cx="245" cy="247" r="9" fill="#1e1608"/>
            <circle cx="280" cy="250" r="9" fill="#1a1208"/><circle cx="315" cy="247" r="9" fill="#1e1608"/>
            <circle cx="355" cy="252" r="9" fill="#1a1208"/><circle cx="395" cy="247" r="9" fill="#1e1608"/>
            <circle cx="435" cy="252" r="9" fill="#1a1208"/><circle cx="475" cy="247" r="9" fill="#1e1608"/>
            <circle cx="515" cy="250" r="9" fill="#1a1208"/><circle cx="555" cy="247" r="9" fill="#1e1608"/>
            <circle cx="595" cy="252" r="9" fill="#1a1208"/><circle cx="630" cy="247" r="9" fill="#1e1608"/>
            <circle cx="665" cy="252" r="9" fill="#1a1208"/>
          </g>
        </svg>
      </div>

    </div>
