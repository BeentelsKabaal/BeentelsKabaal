<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinterklaascorso 2025 – Bêentels Kabaal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="optreden.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <span class="logo-icon">♩</span>
        <span class="logo-text">Bêentels Kabaal</span>
      </a>
      <a href="../index.html#optredens" class="back-link">← Terug naar optredens</a>
    </div>
  </nav>

  <header class="page-hero">
    <div class="page-hero-content">
      <span class="page-eyebrow">Fotoalbum · 9 foto's</span>
      <h1>Sinterklaascorso <em>2025</em></h1>
      <div class="page-meta">
        <span>📅 7 december 2025</span>
        <span>📍 Dorpskern Bentelo</span>
        <span>🕑 14:00 – 17:00 uur</span>
        <span>📷 Foto's: Sandra Hoftijzer</span>
      </div>
    </div>
  </header>

  <main class="photo-section">
    <div class="photo-grid">

      <!-- 1: Parade wide shot -->
      <div class="photo-cell wide">
        <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#060a18"/>
              <stop offset="50%" stop-color="#0d1430"/>
              <stop offset="100%" stop-color="#1a1e3a"/>
            </linearGradient>
          </defs>
          <rect width="800" height="300" fill="url(#sg1)"/>
          <!-- Stars -->
          <circle cx="80" cy="18" r="1.5" fill="rgba(255,255,255,0.7)"/>
          <circle cx="200" cy="12" r="1" fill="rgba(255,255,255,0.5)"/>
          <circle cx="380" cy="15" r="1.5" fill="rgba(255,255,255,0.8)"/>
          <circle cx="560" cy="10" r="1" fill="rgba(255,255,255,0.6)"/>
          <circle cx="720" cy="18" r="1.5" fill="rgba(255,255,255,0.7)"/>
          <!-- Dutch row houses both sides -->
          <rect x="0" y="80" width="95" height="220" fill="#0a0a14"/>
          <polygon points="0,80 0,60 15,60 15,45 30,45 30,32 47,32 47,45 62,45 62,60 77,60 77,80" fill="#080810"/>
          <rect x="100" y="110" width="75" height="190" fill="#0d0d18"/>
          <rect x="180" y="95" width="85" height="205" fill="#0a0a14"/>
          <rect x="540" y="95" width="85" height="205" fill="#0a0a14"/>
          <rect x="630" y="110" width="75" height="190" fill="#0d0d18"/>
          <rect x="708" y="80" width="92" height="220" fill="#0a0a14"/>
          <polygon points="800,80 800,60 785,60 785,45 770,45 770,32 754,32 754,45 739,45 739,60 724,60 724,80" fill="#080810"/>
          <!-- Windows lit up warm -->
          <g fill="rgba(255,200,80,0.45)">
            <rect x="15" y="100" width="18" height="20" rx="1"/>
            <rect x="45" y="100" width="18" height="20" rx="1"/>
            <rect x="15" y="136" width="18" height="20" rx="1"/>
            <rect x="45" y="136" width="18" height="20" rx="1"/>
            <rect x="115" y="128" width="16" height="18" rx="1"/>
            <rect x="145" y="128" width="16" height="18" rx="1"/>
            <rect x="650" y="128" width="16" height="18" rx="1"/>
            <rect x="680" y="128" width="16" height="18" rx="1"/>
            <rect x="724" y="100" width="18" height="20" rx="1"/>
            <rect x="754" y="100" width="18" height="20" rx="1"/>
          </g>
          <!-- Street -->
          <rect y="240" width="800" height="60" fill="#08080e"/>
          <!-- Festival string lights -->
          <polyline points="0,195 100,185 200,195 300,185 400,195 500,185 600,195 700,185 800,195" fill="none" stroke="rgba(80,60,20,0.5)" stroke-width="1.5"/>
          <circle cx="100" cy="185" r="5" fill="rgba(255,200,80,0.85)"/>
          <circle cx="200" cy="195" r="5" fill="rgba(255,80,80,0.85)"/>
          <circle cx="300" cy="185" r="5" fill="rgba(80,160,255,0.85)"/>
          <circle cx="400" cy="195" r="5" fill="rgba(255,200,80,0.85)"/>
          <circle cx="500" cy="185" r="5" fill="rgba(255,80,80,0.85)"/>
          <circle cx="600" cy="195" r="5" fill="rgba(80,160,255,0.85)"/>
          <circle cx="700" cy="185" r="5" fill="rgba(255,200,80,0.85)"/>
          <!-- Street lamp -->
          <line x1="200" y1="130" x2="200" y2="240" stroke="#14141e" stroke-width="4"/>
          <circle cx="200" cy="125" r="10" fill="#14141e"/>
          <ellipse cx="200" cy="133" rx="14" ry="5" fill="rgba(255,200,80,0.65)"/>
          <line x1="600" y1="130" x2="600" y2="240" stroke="#14141e" stroke-width="4"/>
          <circle cx="600" cy="125" r="10" fill="#14141e"/>
          <ellipse cx="600" cy="133" rx="14" ry="5" fill="rgba(255,200,80,0.65)"/>
          <!-- Marching band -->
          <g>
            <circle cx="260" cy="218" r="10" fill="#1a0808"/><rect x="252" y="227" width="16" height="25" fill="#1a0808" rx="1"/><rect x="253" y="229" width="14" height="12" fill="#3a0808" rx="1"/>
            <circle cx="300" cy="215" r="10" fill="#1a0808"/><rect x="292" y="224" width="16" height="25" fill="#1a0808" rx="1"/>
            <circle cx="340" cy="218" r="11" fill="#1a0808"/><rect x="331" y="228" width="18" height="24" fill="#1a0808" rx="1"/>
            <ellipse cx="342" cy="206" rx="11" ry="4" fill="#0d0d0d"/><!-- drum major hat -->
            <circle cx="382" cy="215" r="10" fill="#1a0808"/><rect x="374" y="224" width="16" height="25" fill="#1a0808" rx="1"/>
            <circle cx="422" cy="218" r="10" fill="#1a0808"/><rect x="414" y="227" width="16" height="25" fill="#1a0808" rx="1"/><circle cx="438" cy="215" r="14" fill="none" stroke="#1a0808" stroke-width="4"/>
            <circle cx="464" cy="215" r="10" fill="#1a0808"/><rect x="456" y="224" width="16" height="25" fill="#1a0808" rx="1"/>
            <circle cx="504" cy="218" r="10" fill="#1a0808"/><rect x="496" y="227" width="16" height="25" fill="#1a0808" rx="1"/><ellipse cx="506" cy="235" rx="17" ry="10" fill="none" stroke="#1a0808" stroke-width="3.5"/>
            <circle cx="544" cy="215" r="10" fill="#1a0808"/>
          </g>
          <!-- Spectators sidewalk -->
          <g opacity="0.65">
            <circle cx="155" cy="248" r="9" fill="#10080c"/><circle cx="185" cy="244" r="9" fill="#14080e"/>
            <circle cx="635" cy="248" r="9" fill="#10080c"/><circle cx="665" cy="244" r="9" fill="#14080e"/>
            <circle cx="695" cy="248" r="9" fill="#10080c"/>
          </g>
        </svg>
      </div>

      <!-- 2: Children watching -->
      <div class="photo-cell">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="sg2" cx="50%" cy="40%" r="50%">
              <stop offset="0%" stop-color="rgba(255,200,80,0.25)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </radialGradient>
          </defs>
          <rect width="400" height="300" fill="#080810"/>
          <rect width="400" height="300" fill="url(#sg2)"/>
          <!-- Three children watching parade -->
          <!-- Child 1 (small) -->
          <circle cx="110" cy="170" r="20" fill="#201810"/>
          <rect x="97" y="189" width="26" height="50" fill="#180e0c" rx="2"/>
          <line x1="97" y1="195" x2="78" y2="208" stroke="#180e0c" stroke-width="8" stroke-linecap="round"/>
          <!-- Child 2 (slightly taller) -->
          <circle cx="200" cy="162" r="24" fill="#241c10"/>
          <rect x="185" y="184" width="30" height="58" fill="#1c1008" rx="2"/>
          <line x1="185" y1="192" x2="162" y2="205" stroke="#1c1008" stroke-width="9" stroke-linecap="round"/>
          <!-- Parent behind right -->
          <circle cx="290" cy="145" r="32" fill="#201410"/>
          <rect x="272" y="175" width="36" height="70" fill="#160c08" rx="2"/>
          <!-- Festive hats on children (circle + brim) -->
          <ellipse cx="110" cy="152" rx="20" ry="6" fill="#8b1a2f"/><!-- hat brim -->
          <rect x="96" y="138" width="28" height="16" fill="#8b1a2f" rx="2"/>
          <ellipse cx="200" cy="140" rx="24" ry="7" fill="#8b1a2f"/>
          <rect x="183" y="125" width="34" height="17" fill="#8b1a2f" rx="2"/>
          <!-- Band in distance -->
          <g opacity="0.4">
            <circle cx="30" cy="218" r="8" fill="#1a0808"/>
            <circle cx="55" cy="214" r="8" fill="#1a0808"/>
            <circle cx="80" cy="218" r="8" fill="#1a0808"/>
          </g>
          <!-- Festival lights bokeh -->
          <circle cx="50" cy="50" r="12" fill="rgba(255,200,80,0.12)"/>
          <circle cx="150" cy="30" r="8" fill="rgba(255,80,80,0.10)"/>
          <circle cx="310" cy="40" r="10" fill="rgba(80,160,255,0.10)"/>
          <circle cx="380" cy="60" r="9" fill="rgba(255,200,80,0.12)"/>
          <text x="200" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(201,168,76,0.45)" letter-spacing="1">KINDEREN LANGS DE ROUTE</text>
        </svg>
      </div>

      <!-- 3: Drumline close -->
      <div class="photo-cell">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="sg3" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#060810"/>
              <stop offset="100%" stop-color="#10080a"/>
            </linearGradient>
            <radialGradient id="sg3r" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="rgba(255,200,80,0.15)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </radialGradient>
          </defs>
          <rect width="400" height="300" fill="url(#sg3)"/>
          <rect width="400" height="300" fill="url(#sg3r)"/>
          <!-- Three drum carriers -->
          <!-- Left drummer -->
          <circle cx="90" cy="130" r="28" fill="#1a0808"/>
          <rect x="64" y="156" width="52" height="70" fill="#140606" rx="2"/>
          <rect x="66" y="158" width="48" height="30" fill="#3a0a0a" rx="1"/><!-- red uniform -->
          <!-- Drum on harness -->
          <ellipse cx="90" cy="205" rx="35" ry="18" fill="#0c0808" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
          <ellipse cx="90" cy="200" rx="30" ry="14" fill="#100a08"/>
          <!-- Drumstick up -->
          <line x1="90" y1="158" x2="75" y2="178" stroke="#140606" stroke-width="12" stroke-linecap="round"/>
          <line x1="75" y1="178" x2="58" y2="190" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Center drummer -->
          <circle cx="200" cy="125" r="30" fill="#1a0808"/>
          <rect x="172" y="153" width="56" height="72" fill="#140606" rx="2"/>
          <rect x="174" y="155" width="52" height="32" fill="#3a0a0a" rx="1"/>
          <ellipse cx="200" cy="208" rx="38" ry="20" fill="#0c0808" stroke="rgba(201,168,76,0.35)" stroke-width="2.5"/>
          <ellipse cx="200" cy="202" rx="32" ry="16" fill="#100a08"/>
          <!-- Both sticks -->
          <line x1="200" y1="155" x2="175" y2="175" stroke="#140606" stroke-width="13" stroke-linecap="round"/>
          <line x1="175" y1="175" x2="155" y2="195" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
          <line x1="200" y1="155" x2="225" y2="175" stroke="#140606" stroke-width="13" stroke-linecap="round"/>
          <line x1="225" y1="175" x2="248" y2="192" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
          <!-- Right drummer -->
          <circle cx="315" cy="130" r="28" fill="#1a0808"/>
          <rect x="289" y="156" width="52" height="70" fill="#140606" rx="2"/>
          <rect x="291" y="158" width="48" height="30" fill="#3a0a0a" rx="1"/>
          <ellipse cx="315" cy="205" rx="35" ry="18" fill="#0c0808" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
          <ellipse cx="315" cy="200" rx="30" ry="14" fill="#100a08"/>
          <line x1="315" y1="158" x2="338" y2="178" stroke="#140606" stroke-width="12" stroke-linecap="round"/>
          <line x1="338" y1="178" x2="358" y2="190" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Street in background -->
          <rect y="265" width="400" height="35" fill="#080810"/>
        </svg>
      </div>

    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">

        <span class="lightbox-counter" id="lbCounter">1 / 3</span>
        <button class="lightbox-btn" id="lbNext">Volgende →</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span class="logo-text">♩ Bêentels Kabaal</span>
    <p>Dweilorkest uit het hart van Twente · <a href="../index.html" style="color:var(--gold)">← Terug naar de website</a></p>

</body>
