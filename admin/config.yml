backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: digvsmzrc
    api_key: 466639237722635
    upload_preset: beentels_uploads

locale: nl

collections:
  - name: agenda
    label: Agenda
    files:
      - name: agenda
        label: Agenda items
        file: content/agenda.json
        format: json
        fields:
          - name: items
            label: Agenda items
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
              - name: titel
                label: Titel
                widget: string
              - name: datum
                label: Datum
                widget: string
                hint: "Formaat: YYYY-MM-DD"
              - name: tijdstip
                label: Tijdstip
                widget: string
                required: false
                hint: "bijv: 13:00 – 17:00 uur"
              - name: locatie
                label: Locatie
                widget: string
              - name: beschrijving
                label: Beschrijving
                widget: text
                required: false
              - name: label
                label: Label
                widget: string
                required: false
                hint: "bijv: Bijna vol"
              - name: hoofd
                label: Uitlichten als hoofdevenement
                widget: boolean
                default: false

  - name: over_ons
    label: Over ons
    files:
      - name: over_ons
        label: Afbeeldingen slideshow
        file: content/over-ons.json
        format: json
        fields:
          - name: afbeeldingen
            label: Afbeeldingen slideshow
            widget: list
            hint: "Voeg afbeeldingen toe voor de slideshow naast de tekst"
            fields:
              - name: afbeelding
                label: Afbeelding
                widget: image
              - name: alt
                label: Beschrijving (alt-tekst)
                widget: string
                required: false

  - name: impressie
    label: Impressie
    files:
      - name: impressie
        label: Impressie
        file: content/evenementen.json
        format: json
        fields:
          - name: items
            label: Impressie items
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
                hint: "Unieke code zonder spaties, bijv: koningsdag-2026"
              - name: titel
                label: Titel
                widget: string
              - name: datum
                label: Datum
                widget: string
                hint: "Formaat: YYYY-MM-DD"
              - name: locatie
                label: Locatie
                widget: string
                required: false
              - name: beschrijving
                label: Beschrijving
                widget: text
                required: false
              - name: omslagfoto
                label: Omslagfoto
                widget: image
              - name: fotos
                label: Foto's
                widget: list
                fields:
                  - name: afbeelding
                    label: Afbeelding
                    widget: image
                  - name: bijschrift
                    label: Bijschrift
                    widget: string
                    required: false

  - name: repertoire
    label: Repertoire
    files:
      - name: repertoire
        label: Repertoire
        file: content/repertoire.json
        format: json
        fields:
          - name: sets
            label: Nummers (sets)
            widget: list
            hint: "Elk item is een set van nummers, bijv: Slavenkoor / Feestmedley / Laat de zon"
            field:
              name: set
              label: Set
              widget: string
          - name: los
            label: Losse nummers
            widget: list
            hint: "Losse nummers die apart worden gespeeld"
            field:
              name: nummer
              label: Nummer
              widget: string

  - name: quotes
    label: Citaten slideshow
    files:
      - name: quotes
        label: Citaten
        file: content/quotes.json
        format: json
        fields:
          - name: items
            label: Citaten
            widget: list
            fields:
              - name: tekst
                label: Citaat tekst
                widget: text
              - name: bron
                label: Bron (optioneel)
                widget: string
                required: false
